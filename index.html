<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC 레이더스 퀘스트 트래커</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --line:#2a3038;
    --text:#e6edf3; --muted:#8b949e; --accent:#f0883e; --accent2:#58a6ff;
    --on:#3fb950; --chip:#21262d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo","Noto Sans KR",sans-serif;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    padding:14px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:14px; background:var(--panel); flex-shrink:0;
  }
  header h1{font-size:17px; font-weight:700; letter-spacing:.3px}
  header h1 .dim{color:var(--accent); font-weight:800}
  header .count{font-size:12px; color:var(--muted); margin-left:auto}
  .layout{display:flex; flex:1; min-height:0}
  /* sidebar */
  .side{width:380px; flex-shrink:0; border-right:1px solid var(--line); display:flex; flex-direction:column; background:var(--panel)}
  .search{padding:14px; border-bottom:1px solid var(--line)}
  .search input{
    width:100%; padding:10px 12px; background:var(--bg); border:1px solid var(--line);
    border-radius:8px; color:var(--text); font-size:14px; outline:none;
  }
  .search input:focus{border-color:var(--accent2)}
  .search .hint{font-size:11px; color:var(--muted); margin-top:7px}
  .results{flex:1; overflow-y:auto; padding:6px}
  .empty{padding:30px 18px; text-align:center; color:var(--muted); font-size:13px; line-height:1.7}
  .qrow{
    display:flex; align-items:flex-start; gap:10px; padding:10px 12px; border-radius:8px;
    cursor:pointer; border:1px solid transparent;
  }
  .qrow:hover{background:var(--panel2)}
  .qrow .cb{
    width:18px;height:18px;border:1.5px solid var(--line);border-radius:5px;flex-shrink:0;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;transition:.12s;
  }
  .qrow.on .cb{background:var(--on);border-color:var(--on)}
  .qrow .body{flex:1;min-width:0}
  .qrow .nm{font-size:14px;font-weight:600;line-height:1.35}
  .qrow .en{font-size:11px;color:var(--muted);margin-top:1px}
  .qrow .mp{margin-top:5px;display:flex;flex-wrap:wrap;gap:4px}
  .qrow .tag{font-size:10.5px;background:var(--chip);color:var(--muted);padding:2px 7px;border-radius:20px;white-space:nowrap}
  .qrow.on .nm{color:var(--on)}
  /* active section header */
  .sec{padding:12px 14px 6px;font-size:11px;letter-spacing:.5px;color:var(--muted);text-transform:uppercase;font-weight:700}
  /* main */
  .main{flex:1; display:flex; flex-direction:column; min-width:0}
  .tabs{display:flex; gap:2px; padding:10px 12px 0; border-bottom:1px solid var(--line); overflow-x:auto; flex-shrink:0; background:var(--panel)}
  .tab{
    padding:9px 15px; font-size:13px; color:var(--muted); cursor:pointer; white-space:nowrap;
    border-bottom:2px solid transparent; display:flex; align-items:center; gap:7px;
  }
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent); font-weight:600}
  .tab .b{font-size:11px; background:var(--chip); color:var(--text); border-radius:20px; padding:1px 7px; min-width:18px; text-align:center}
  .tab.active .b{background:var(--accent); color:#0d1117; font-weight:700}
  #map{flex:1; background:#000; min-height:0}
  .mapempty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;text-align:center;line-height:1.8;padding:20px}
  /* leaflet marker */
  .qmark{
    background:var(--accent); width:14px;height:14px;border-radius:50% 50% 50% 0;
    transform:rotate(-45deg); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.6);
  }
  .leaflet-popup-content-wrapper{background:var(--panel2);color:var(--text);border-radius:8px;border:1px solid var(--line)}
  .leaflet-popup-tip{background:var(--panel2);border:1px solid var(--line)}
  .leaflet-popup-content{margin:11px 14px;font-size:13px;line-height:1.5}
  .leaflet-popup-content b{color:var(--accent);font-size:14px}
  .leaflet-popup-content .oen{color:var(--muted);font-size:11px;margin-top:3px;display:block}
  .leaflet-container a.leaflet-popup-close-button{color:var(--muted)}
  /* scrollbar */
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#30363d;border-radius:5px}
  ::-webkit-scrollbar-track{background:transparent}
  footer{
    flex-shrink:0; padding:9px 20px; border-top:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-size:11px; line-height:1.6; text-align:center;
  }
  footer a{color:var(--accent2); text-decoration:none}
  footer a:hover{text-decoration:underline}
  @media(max-width:760px){
    .layout{flex-direction:column}
    .side{width:100%;flex:0 0 42%;border-right:none;border-bottom:1px solid var(--line)}
    .main{flex:1 1 auto;min-height:0}
  }
</style>
</head>

const LS_KEY = 'arc_active_quests_v1';
let active = new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]'));
let curMap = null;
let map=null, layer=null, markers=[];

const byId = {}; DATA.quests.forEach(q=>byId[q.id]=q);

function save(){ localStorage.setItem(LS_KEY, JSON.stringify([...active])); }

// ---- search / results ----
const qInput=document.getElementById('q');
const resultsEl=document.getElementById('results');
function renderResults(){
  const term=qInput.value.trim().toLowerCase();
  let list;
  let showActiveSection=false;
  if(!term){
    // show active quests first when no search
    list = DATA.quests.filter(q=>active.has(q.id));
    showActiveSection=true;
  } else {
    list = DATA.quests.filter(q=>
      q.name_ko.toLowerCase().includes(term) ||
      q.name_en.toLowerCase().includes(term) ||
      q.locations.some(l=>l.objective.toLowerCase().includes(term))
    );
  }
  let html='';
  if(showActiveSection){
    if(list.length===0){
      html='<div class="empty">아직 진행 중인 퀘스트가 없습니다.<br>위 검색창에서 퀘스트를 찾아 체크하세요.</div>';
    } else {
      html='<div class="sec">진행 중 ('+list.length+')</div>';
    }
  }
  for(const q of list){
    const on=active.has(q.id);
    const tags=q.maps.map(m=>{
      const meta=DATA.mapMeta.maps.find(x=>x.id===m);
      return '<span class="tag">'+(meta?meta.ko:m)+'</span>';
    }).join('');
    html+='<div class="qrow'+(on?' on':'')+'" data-id="'+q.id+'">'+
      '<div class="cb">'+(on?'✓':'')+'</div>'+
      '<div class="body"><div class="nm">'+esc(q.name_ko)+'</div>'+
      '<div class="en">'+esc(q.name_en)+'</div>'+
      '<div class="mp">'+tags+'</div></div></div>';
  }
  resultsEl.innerHTML=html;
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

resultsEl.addEventListener('click',e=>{
  const row=e.target.closest('.qrow'); if(!row)return;
  const id=row.dataset.id;
  if(active.has(id)) active.delete(id); else active.add(id);
  save(); renderResults(); renderTabs(); 
  // if current map no longer has active quests, or to refresh markers
  if(curMap) drawMap(curMap);
  updateHeader();
});
qInput.addEventListener('input',renderResults);

// ---- tabs (maps with active quests) ----
function activeMapsList(){
  const counts={};
  for(const id of active){
    const q=byId[id]; if(!q)continue;
    for(const m of q.maps) counts[m]=(counts[m]||0)+1;
  }
  // keep map order from mapMeta
  return DATA.mapMeta.maps.filter(m=>counts[m.id]).map(m=>({...m,count:counts[m.id]}));
}
function renderTabs(){
  const maps=activeMapsList();
  const tabsEl=document.getElementById('tabs');
  if(maps.length===0){
    tabsEl.innerHTML=''; curMap=null;
    document.getElementById('map').style.display='none';
    document.getElementById('mapempty').style.display='flex';
    return;
  }
  if(!curMap || !maps.find(m=>m.id===curMap)) curMap=maps[0].id;
  tabsEl.innerHTML=maps.map(m=>
    '<div class="tab'+(m.id===curMap?' active':'')+'" data-map="'+m.id+'">'+
    esc(m.ko)+'<span class="b">'+m.count+'</span></div>'
  ).join('');
  tabsEl.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{curMap=t.dataset.map; renderTabs(); drawMap(curMap);});
  document.getElementById('map').style.display='block';
  document.getElementById('mapempty').style.display='none';
  drawMap(curMap);
}

// ---- leaflet map ----
const IMG=DATA.mapMeta.image, SIZE=DATA.mapMeta.size;
function initMap(){
  map=L.map('map',{crs:L.CRS.Simple,minZoom:-2,maxZoom:3,zoomControl:true,attributionControl:false});
}
function drawMap(mapId){
  if(!map) initMap();
  const meta=DATA.mapMeta.maps.find(m=>m.id===mapId);
  const bounds=[[0,0],[IMG,IMG]];
  if(layer) map.removeLayer(layer);
  layer=L.imageOverlay(meta.img,bounds).addTo(map);
  map.fitBounds(bounds);
  markers.forEach(mk=>map.removeLayer(mk)); markers=[];
  // place markers for active quests that have a location on this map
  for(const id of active){
    const q=byId[id]; if(!q)continue;
    for(const loc of q.locations){
      if(loc.map!==mapId) continue;
      // coord -> image pixel. 게임 좌표 원점=왼쪽아래(y가 위로 증가).
      // Leaflet imageOverlay [[0,0],[IMG,IMG]]도 lat 큰 값이 위(North)이므로 y를 그대로 lat으로 사용.
      const px = loc.x / SIZE * IMG;
      const py = loc.y / SIZE * IMG;
      const icon=L.divIcon({className:'',html:'<div class="qmark"></div>',iconSize:[14,14],iconAnchor:[7,14]});
      const mk=L.marker([py, px],{icon}).addTo(map);
      mk.bindPopup('<b>'+esc(q.name_ko)+'</b><br>'+esc(loc.objective)+
        '<span class="oen">'+esc(q.name_en)+'</span>');
      markers.push(mk);
    }
  }
}

function updateHeader(){
  document.getElementById('hdrcount').textContent='진행 중 '+active.size+'개';
}

// init
renderResults(); renderTabs(); updateHeader();
</script>
